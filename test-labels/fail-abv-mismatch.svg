<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1300" viewBox="0 0 900 1300">
  <rect width="900" height="1300" fill="#f8f3e8"/>
  <rect x="70" y="70" width="760" height="1160" rx="18" fill="#fffaf0" stroke="#17202a" stroke-width="8"/>
  <rect x="105" y="105" width="690" height="1090" fill="none" stroke="#b26b00" stroke-width="4"/>
  <text x="450" y="205" text-anchor="middle" font-family="Georgia, serif" font-size="62" font-weight="700" fill="#17202a">OLD TOM</text>
  <text x="450" y="270" text-anchor="middle" font-family="Georgia, serif" font-size="46" font-weight="700" fill="#17202a">DISTILLERY</text>
  <line x1="185" y1="315" x2="715" y2="315" stroke="#17202a" stroke-width="3"/>
  <text x="450" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#17202a">Kentucky Straight Bourbon Whiskey</text>
  <text x="450" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#17202a">40% Alc./Vol. (80 Proof)</text>
  <text x="450" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#17202a">Net Contents 750 mL</text>
  <text x="450" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" fill="#17202a">Bottled by Old Tom Distillery</text>
  <text x="450" y="690" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" fill="#17202a">112 Barrel House Road, Frankfort, KY 40601</text>
  <rect x="135" y="820" width="630" height="250" fill="#ffffff" stroke="#17202a" stroke-width="3"/>
  <text x="160" y="870" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#17202a">GOVERNMENT WARNING:</text>
  <text x="160" y="910" font-family="Arial, sans-serif" font-size="23" fill="#17202a">(1) According to the Surgeon General, women should not</text>
  <text x="160" y="944" font-family="Arial, sans-serif" font-size="23" fill="#17202a">drink alcoholic beverages during pregnancy because of</text>
  <text x="160" y="978" font-family="Arial, sans-serif" font-size="23" fill="#17202a">the risk of birth defects. (2) Consumption of alcoholic</text>
  <text x="160" y="1012" font-family="Arial, sans-serif" font-size="23" fill="#17202a">beverages impairs your ability to drive a car or operate</text>
  <text x="160" y="1046" font-family="Arial, sans-serif" font-size="23" fill="#17202a">machinery, and may cause health problems.</text>
</svg>
